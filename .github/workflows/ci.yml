name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [pubsub, redis, storage]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

      - name: Run staticcheck
        working-directory: ${{ matrix.module }}
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [pubsub, redis, storage]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: [pubsub, redis, storage]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test ./... -count=1
