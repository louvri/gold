name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - "pubsub/**"
      - "redis/**"
      - "storage/**"

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      modules: ${{ steps.changes.outputs.modules }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed modules
        id: changes
        run: |
          modules=()
          for module in pubsub redis storage; do
            changed=$(git diff --name-only origin/main...HEAD -- "$module/" 2>/dev/null || echo "$module/")
            if [ -n "$changed" ]; then
              modules+=("\"$module\"")
            fi
          done
          if [ ${#modules[@]} -eq 0 ]; then
            echo "modules=[]" >> "$GITHUB_OUTPUT"
          else
            echo "modules=[$(IFS=,; echo "${modules[*]}")]" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint (${{ matrix.module }})
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          working-directory: ${{ matrix.module }}

  build:
    name: Build (${{ matrix.module }})
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build
        working-directory: ${{ matrix.module }}
        run: go build ./...
        env:
          GOWORK: "off"

  test:
    name: Test (${{ matrix.module }})
    needs: detect-changes
    if: needs.detect-changes.outputs.modules != '[]'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        module: ${{ fromJSON(needs.detect-changes.outputs.modules) }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Test
        working-directory: ${{ matrix.module }}
        run: go test ./... -count=1
        env:
          GOWORK: "off"
