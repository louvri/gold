name: CI

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: pubsub

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: redis

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: storage

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Build all modules
        run: |
          go build ./pubsub/...
          go build ./redis/...
          go build ./storage/...

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Test pubsub
        working-directory: pubsub
        run: go test ./... -count=1

      - name: Test redis
        working-directory: redis
        run: go test ./... -count=1

      - name: Test storage
        working-directory: storage
        run: go test ./... -count=1
