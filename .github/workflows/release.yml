name: Release

on:
  push:
    branches: [main]
    paths:
      - "pubsub/**"
      - "redis/**"
      - "storage/**"

permissions:
  contents: write

jobs:
  release:
    name: Tag Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Tag sub-modules
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          for module in pubsub redis storage; do
            # Get latest tag for this sub-module
            latest=$(git tag --sort=-v:refname -l "${module}/v*" | head -n 1)
            if [ -z "$latest" ]; then
              latest="${module}/v0.0.0"
            fi

            # Check if sub-module has changes since its latest tag
            changes=$(git diff --name-only "$latest"..HEAD -- "$module/" 2>/dev/null || echo "$module/")
            if [ -z "$changes" ]; then
              echo "No changes in $module since $latest, skipping"
              continue
            fi

            # Bump patch version
            version="${latest#${module}/v}"
            IFS='.' read -r major minor patch <<< "$version"
            patch=$((patch + 1))
            new_tag="${module}/v${major}.${minor}.${patch}"

            echo "Tagging $new_tag"
            git tag "$new_tag"
            git push origin "$new_tag"

            gh release create "$new_tag" \
              --generate-notes \
              --title "$new_tag"
          done
